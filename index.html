<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyPokerTable</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --felt:#1a2e1a;--felt2:#1f361f;--felt3:#243d24;
  --cream:#f5f0e8;--gold:#c9a84c;--gold2:#e8c96a;
  --green:#4a9e5c;--red:#c94a4a;--purple:#8b5cf6;
  --t1:#f5f0e8;--t2:#c8bfa8;--t3:#8a7f6a;--t4:#4a4035;
  --cb:#1f3620;--cbr:#2d4a2d;--mb:#162416;
}
html,body{background:var(--felt);color:var(--t1);font-family:Georgia,serif;min-height:100vh}
body{overflow-y:scroll;-webkit-overflow-scrolling:touch}
.app{max-width:430px;margin:0 auto;padding-bottom:90px}

/* Avatars */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;letter-spacing:-.5px;border:2px solid transparent}
.av-sm{width:34px;height:34px;font-size:11px}
.av-md{width:44px;height:44px;font-size:14px}
.av-lg{width:58px;height:58px;font-size:18px}
.av-sel{border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(201,168,76,.3)}
.av-c0{background:#2d6a4f;color:#95d5b2}.av-c1{background:#6b3d2e;color:#e8b4a0}
.av-c2{background:#3d4a6b;color:#a0b4e8}.av-c3{background:#6b2d4f;color:#e8a0c8}
.av-c4{background:#4a6b2d;color:#b4e8a0}.av-c5{background:#6b6b2d;color:#e8e0a0}
.av-c6{background:#2d4a6b;color:#a0c8e8}.av-c7{background:#6b4a2d;color:#e8c8a0}

/* Header */
.hdr{background:var(--felt2);border-bottom:1px solid var(--cbr);padding:14px 16px 0;position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:19px;font-weight:900;color:var(--cream);letter-spacing:-.3px}
.logo span{color:var(--gold)}
.sync-bar{display:flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:0 0 8px}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-ok .sdot{background:var(--green)}.s-saving .sdot{background:var(--gold);animation:blink2 .8s infinite}.s-err .sdot{background:var(--red)}
@keyframes blink2{0%,100%{opacity:.3}50%{opacity:1}}
.pg{padding:14px 14px 0}

/* Cards */
.card{background:var(--cb);border:1px solid var(--cbr);border-radius:14px;padding:16px;margin-bottom:12px}
.ct{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.ct.g{color:var(--gold)}

/* Buttons */
.btn{border:none;cursor:pointer;font-family:Georgia,serif;font-weight:700;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.bg{background:var(--gold);color:#1a1a0a;padding:10px 18px;font-size:13px}
.bg:active{background:var(--gold2)}
.bd{background:rgba(0,0,0,.3);color:var(--t2);padding:10px 18px;font-size:13px;border:1px solid var(--cbr)}
.br{background:rgba(180,40,40,.2);color:var(--red);padding:12px 18px;font-size:13px;border:1px solid rgba(180,40,40,.3)}
.bai{background:linear-gradient(90deg,#4c1d95,#78350f);color:#fff;padding:10px 18px;font-size:13px}
.fw{width:100%;padding:13px}
.dsh{background:none;border:2px dashed var(--cbr);color:var(--t3);width:100%;padding:11px;font-size:13px;border-radius:10px;font-family:Georgia,serif;cursor:pointer}
.dsh:active{border-color:var(--gold);color:var(--gold)}

/* Hero */
.hero{background:linear-gradient(160deg,var(--felt3),var(--felt));border:1px solid var(--cbr);border-radius:18px;padding:22px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,168,76,.06),transparent 70%);pointer-events:none}
.hero-lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.hero-amt{font-size:42px;font-weight:900;line-height:1;letter-spacing:-1px}
.hchg{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:6px}
.hchg.pos{background:rgba(74,158,92,.2);color:var(--green)}
.hchg.neg{background:rgba(201,74,74,.2);color:var(--red)}

/* Pills */
.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:14px}
.pills::-webkit-scrollbar{display:none}
.pill{background:var(--cb);border:1px solid var(--cbr);border-radius:10px;padding:10px 14px;min-width:80px;text-align:center;flex-shrink:0}
.pill-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:3px}
.pill-v{font-size:14px;font-weight:700}

/* Chart */
.ch-wrap{position:relative;height:80px;margin:4px 0 2px}
.ch-zero{position:absolute;left:0;right:0;top:50%;border-top:1px dashed rgba(201,168,76,.2)}
.ch-lbls{display:flex;justify-content:space-between;margin-top:3px}

/* Session rows */
.srow{background:var(--cb);border:1px solid var(--cbr);border-radius:14px;margin-bottom:10px;overflow:hidden}
.srow.act{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.15)}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer}
.shdr:active{background:var(--felt3)}
.smeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sbody{padding:13px 14px;border-top:1px solid var(--cbr);display:none}
.pres{background:rgba(0,0,0,.2);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.pres-top{display:flex;align-items:center;gap:10px}
.pres-r{flex:1;display:flex;justify-content:space-between;align-items:center}
.pnote{font-size:11px;color:var(--t3);font-style:italic;margin-top:7px;padding-top:7px;border-top:1px solid var(--cbr)}
.snote{background:rgba(0,0,0,.2);border-radius:10px;padding:10px 12px;font-size:11px;font-style:italic;color:var(--t3);margin-top:8px}

/* Settlement */
.stl-t{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin:12px 0 7px}
.txn{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.2);border-radius:10px;padding:10px 13px;margin-bottom:6px}
.allsq{background:rgba(74,158,92,.1);border:1px solid rgba(74,158,92,.3);border-radius:10px;padding:10px;text-align:center;color:var(--green);font-size:13px;margin-top:8px}

/* AI */
.ai-box{background:linear-gradient(135deg,rgba(76,29,149,.12),rgba(120,53,15,.08));border:1px solid rgba(139,92,246,.25);border-radius:12px;padding:14px;margin-top:10px}
.ai-t{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#a78bfa;margin-bottom:8px}
.ai-body{font-size:13px;color:var(--t2);line-height:1.7;white-space:pre-wrap}
.ai-prof{background:linear-gradient(135deg,rgba(76,29,149,.1),transparent);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:12px;margin-top:10px}
.ai-prof-l{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#a78bfa;margin-bottom:6px}
.ai-prof-t{font-size:12px;color:var(--t2);line-height:1.6;white-space:pre-wrap}
.thinking{display:flex;align-items:center;gap:8px;color:#a78bfa;font-size:12px;font-style:italic;padding:4px 0}
.dots span{width:5px;height:5px;background:#a78bfa;border-radius:50%;display:inline-block;margin:0 1px;animation:blink 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* Balance */
.bal{border-radius:10px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:10px}
.bok{background:rgba(74,158,92,.1);border:1px solid rgba(74,158,92,.3)}
.berr{background:rgba(201,74,74,.1);border:1px solid rgba(201,74,74,.3)}

/* Active session banner */
.act-banner{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink2 .8s infinite;display:inline-block;margin-right:5px}

/* ── LIVE TAB ── */
.live-hdr{background:linear-gradient(135deg,var(--felt3),var(--felt2));border:1px solid var(--cbr);border-radius:14px;padding:14px;margin-bottom:12px}
.hand-num{font-size:28px;font-weight:900;color:var(--gold);line-height:1}
.hand-sub{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.street-bar{display:flex;gap:4px;margin-bottom:16px}
.ss{flex:1;height:4px;border-radius:2px;background:var(--cbr);transition:.2s}
.ss.done{background:var(--green)}.ss.active{background:var(--gold)}
.slbl{font-size:16px;font-weight:900;color:var(--cream);margin-bottom:14px;letter-spacing:-.2px}

/* Player toggle */
.pl-tgl{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--cbr);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.15s}
.pl-tgl.on{background:rgba(201,168,76,.07);border-color:rgba(201,168,76,.35)}
.pl-tgl.off{opacity:.5}
.tgl{width:38px;height:22px;border-radius:11px;background:var(--cbr);position:relative;flex-shrink:0;transition:.2s;cursor:pointer}
.tgl.on{background:var(--green)}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
.tgl.on::after{left:19px}

/* Rebuy row */
.rebuy-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(0,0,0,.2);border:1px solid var(--cbr);border-radius:12px;margin-bottom:8px}
.rebuy-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.rebuy-name{font-size:14px;font-weight:700;color:var(--cream)}
.rebuy-invested{font-size:11px;color:var(--t3);margin-top:2px}

/* Stepper */
.stp{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.3);border:1px solid var(--cbr);border-radius:8px;padding:3px}
.sb{width:32px;height:32px;border-radius:6px;background:rgba(201,168,76,.15);border:none;color:var(--gold);font-size:20px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:Georgia,serif;flex-shrink:0}
.sb:active{background:var(--gold);color:#1a1a0a}
.sv{width:26px;text-align:center;font-size:15px;font-weight:700;color:var(--cream)}

/* Dealer grid */
.dealer-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.dealer-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:6px 2px;border-radius:10px}
.dealer-name{font-size:10px;color:var(--t3);text-align:center;line-height:1.2}

/* Cards */
.brd-cards{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pcard{width:42px;height:58px;border-radius:6px;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:.15s}
.pcard:active{transform:scale(.95)}
.pcard.empty{background:rgba(0,0,0,.2);border:2px dashed var(--cbr);color:var(--t3);font-size:20px}
.pcard.red{color:#c94a4a}.pcard.blk{color:#1a2e1a}
.cv{font-size:14px;font-weight:900;line-height:1}
.cs{font-size:11px;line-height:1}
.suit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.suit-btn{height:56px;border-radius:10px;background:rgba(0,0,0,.3);border:1px solid var(--cbr);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.suit-btn:active,.suit-btn.sel{background:rgba(201,168,76,.2);border-color:var(--gold)}
.suit-btn.red{color:#c94a4a}.suit-btn.blk{color:var(--cream)}
.val-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.val-btn{height:44px;border-radius:8px;background:rgba(0,0,0,.3);border:1px solid var(--cbr);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:.15s}
.val-btn:active,.val-btn.sel{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold)}

/* Action rows */
.act-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.act-row{background:rgba(0,0,0,.2);border:1px solid var(--cbr);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.act-row-name{font-size:13px;font-weight:700;color:var(--cream);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-btns{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.abt2{font-size:11px;font-weight:700;padding:6px 9px;border-radius:7px;border:1px solid var(--cbr);background:rgba(0,0,0,.3);color:var(--t3);cursor:pointer;font-family:Georgia,serif;transition:.15s}
.abt2.sc,.abt2.sl{background:rgba(74,158,92,.2);border-color:var(--green);color:var(--green)}
.abt2.sf{background:rgba(201,74,74,.2);border-color:var(--red);color:var(--red)}
.abt2.sr,.abt2.sb2{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold)}
.abt2.sa{background:rgba(139,92,246,.2);border-color:var(--purple);color:var(--purple)}
.amt-inp{width:80px;background:rgba(0,0,0,.4);border:1px solid var(--cbr);border-radius:6px;padding:5px 7px;color:var(--t1);font-family:Georgia,serif;font-size:12px;display:none}
.amt-inp.show{display:block}

/* Showdown */
.winner-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.wbtn{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,.2);border:1px solid var(--cbr);border-radius:10px;padding:8px 4px;cursor:pointer;transition:.15s}
.wbtn.sel{background:rgba(201,168,76,.15);border-color:var(--gold)}
.winner-name{font-size:10px;color:var(--t3);text-align:center}
.hcard-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:8px 10px;background:rgba(0,0,0,.2);border:1px solid var(--cbr);border-radius:10px}
.hcard-name{font-size:12px;font-weight:700;color:var(--t2);flex:1}
.hcard-inp{width:110px;background:rgba(0,0,0,.3);border:1px solid var(--cbr);border-radius:6px;padding:6px 8px;color:var(--t1);font-family:Georgia,serif;font-size:12px}

/* Hand log */
.hlog{background:rgba(0,0,0,.15);border-radius:10px;padding:10px 12px;margin-bottom:6px;font-size:12px}
.hlog-hdr{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;color:var(--t3)}
.sname{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:5px 0 2px}
.brd-mini{display:flex;gap:3px;margin:3px 0}
.mc{padding:2px 5px;border-radius:4px;font-size:11px;font-weight:700;background:var(--cream);display:inline-block}
.mc.red{color:#c94a4a}.mc.blk{color:#1a2e1a}
.chip{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:10px;margin:2px 2px 0 0}
.chk,.cll{background:rgba(74,158,92,.15);color:var(--green)}
.fld{background:rgba(201,74,74,.15);color:var(--red)}
.rse,.bet{background:rgba(201,168,76,.15);color:var(--gold)}
.ali{background:rgba(139,92,246,.15);color:var(--purple)}
.win-chip{background:rgba(201,168,76,.2);color:var(--gold);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;display:inline-block;margin-top:4px}

/* Cashout modal rows */
.co-row{display:flex;align-items:center;gap:10px;padding:11px 12px;background:rgba(0,0,0,.2);border:1px solid var(--cbr);border-radius:12px;margin-bottom:8px}
.co-info{flex:1;min-width:0}
.co-name{font-size:13px;font-weight:700;color:var(--cream)}
.co-inv{font-size:11px;color:var(--t3);margin-top:1px}
.co-inp{width:90px;text-align:center;font-size:14px;font-weight:700;background:rgba(0,0,0,.4)!important}
.co-pnl{font-size:13px;font-weight:700;min-width:70px;text-align:right}

/* Tendency */
.tend-card{background:rgba(0,0,0,.2);border:1px solid var(--cbr);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.tend-stat{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(45,74,45,.5)}
.tend-stat:last-child{border-bottom:none}
.tl{color:var(--t3)}.tv{color:var(--t2);font-weight:700}

/* Players tab */
.pc{background:var(--cb);border:1px solid var(--cbr);border-radius:14px;padding:14px;margin-bottom:10px}
.pc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.pc-info{flex:1;min-width:0}
.pc-name{font-size:16px;font-weight:900;color:var(--cream);letter-spacing:-.2px}
.ptag{display:inline-flex;font-size:9px;border:1px solid;border-radius:20px;padding:2px 8px;margin-top:5px;letter-spacing:.05em}
.pc-acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.abt{background:rgba(0,0,0,.2);border:1px solid var(--cbr);border-radius:8px;padding:5px 10px;cursor:pointer;font-family:Georgia,serif;font-size:11px;color:var(--t2)}
.abt.gld{color:var(--gold);border-color:rgba(201,168,76,.3)}
.abt.prp{color:#a78bfa;border-color:rgba(139,92,246,.3)}
.abt.rrd{color:var(--red);border-color:rgba(201,74,74,.3)}
.pc-bio{font-size:13px;color:var(--t2);line-height:1.6}
.pc-bio.em{color:var(--t4);font-style:italic}
.ne-row{display:flex;align-items:center;gap:6px;flex:1}
.ne-row input{flex:1;padding:7px 10px;font-size:13px}
.ns-btn{background:var(--gold);color:#1a1a0a;border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:Georgia,serif}

/* Leaderboard */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:20px;padding-top:10px}
.pod{display:flex;flex-direction:column;align-items:center;flex:1;max-width:110px}
.pod-bar{width:100%;border-radius:8px 8px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8px}
.p1{background:linear-gradient(180deg,rgba(201,168,76,.3),rgba(201,168,76,.1));border:1px solid rgba(201,168,76,.4)}
.p2{background:linear-gradient(180deg,rgba(180,180,180,.2),rgba(180,180,180,.05));border:1px solid rgba(180,180,180,.25)}
.p3{background:linear-gradient(180deg,rgba(150,100,50,.2),rgba(150,100,50,.05));border:1px solid rgba(150,100,50,.25)}
.pod-name{font-size:11px;color:var(--t2);margin-top:4px;text-align:center;font-weight:700}
.pod-amt{font-size:12px;font-weight:900;margin-top:2px}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--cbr)}
.lb-row:first-child{border-top:none}
.lb-bar{height:4px;border-radius:2px;margin:4px 0;min-width:2px}
.lb-meta{display:flex;gap:8px;flex-wrap:wrap}
.lb-meta span{font-size:10px;color:var(--t3)}
table{width:100%;border-collapse:collapse;font-size:11px}
th{color:var(--t3);font-weight:normal;padding-bottom:8px;text-align:right;font-family:Georgia,serif;font-size:10px}
th:first-child{text-align:left}
td{padding:6px 3px;text-align:right;font-weight:600;font-family:Georgia,serif}
td:first-child{text-align:left;color:var(--t2);font-weight:normal}
tr+tr{border-top:1px solid var(--cbr)}
.tr-tot td{border-top:2px solid var(--cbr);color:var(--gold);font-weight:900}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--felt2);border-top:1px solid var(--cbr);display:flex;z-index:40;max-width:430px;margin:0 auto}

// ── Settlement ────────────────────────────────────────────────
function calcSettle(results,pl){
  pl=pl||A.players;
  var bal=[];
  Object.keys(results||{}).forEach(function(id){var a=Math.round(Number(results[id])||0);if(Math.abs(a)>0)bal.push({id:id,amt:a});});
  var cr=bal.filter(function(x){return x.amt>0;}).sort(function(a,b){return b.amt-a.amt;}).map(function(x){return{id:x.id,amt:x.amt};});
  var db=bal.filter(function(x){return x.amt<0;}).sort(function(a,b){return a.amt-b.amt;}).map(function(x){return{id:x.id,amt:x.amt};});
  var txns=[];var i=0,j=0;
  while(i<cr.length&&j<db.length){var a=Math.min(cr[i].amt,Math.abs(db[j].amt));if(a>0)txns.push({from:db[j].id,to:cr[i].id,amount:a});cr[i].amt-=a;db[j].amt+=a;if(Math.abs(cr[i].amt)<1)i++;if(Math.abs(db[j].amt)<1)j++;}
  return txns;
}
function settlH(results,pl){
  pl=pl||A.players;
  var txns=calcSettle(results,pl);
  if(!txns.length)return'<div class="allsq">&#10003; All square — no payments needed</div>';
  var h='<div class="stl-t">Who Pays Who</div>';
  txns.forEach(function(t){
    var fn=((pl.find(function(p){return p.id===t.from;})||{}).name)||t.from;
    var tn=((pl.find(function(p){return p.id===t.to;})||{}).name)||t.to;
    h+='<div class="txn"><span><span class="rrd fw7">'+esc(fn)+'</span><span style="color:var(--t3);margin:0 7px">&rarr;</span><span class="grn fw7">'+esc(tn)+'</span></span><span class="gld fw7">Rs.'+t.amount.toLocaleString('en-IN')+'</span></div>';
  });
  return h;
}

// ── Claude AI ─────────────────────────────────────────────────
function callClaude(prompt,onChunk,onDone,onErr){
  if(!A.apiKey){onErr('No API key set. Go to Settings tab and add your Claude API key (sk-ant-...).');return;}
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':A.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,stream:true,messages:[{role:'user',content:prompt}]})
  }).then(function(res){
    if(!res.ok){return res.json().then(function(e){onErr((e.error&&e.error.message)||'API error '+res.status);});}
    var reader=res.body.getReader(),decoder=new TextDecoder(),buf='';
    function read(){
      reader.read().then(function(result){
        if(result.done){onDone();return;}
        buf+=decoder.decode(result.value,{stream:true});
        var lines=buf.split('\n');buf=lines.pop();
        lines.forEach(function(line){if(!line.startsWith('data:'))return;var d=line.slice(5).trim();try{var j=JSON.parse(d);if(j.type==='content_block_delta'&&j.delta&&j.delta.text)onChunk(j.delta.text);}catch(e){}});
        read();
      }).catch(function(e){onErr(e.message);});
    }
    read();
  }).catch(function(e){onErr(e.message);});
}

function buildSessPrompt(s,sHands){
  var pl=s.players||A.players;
  var lines=pl.map(function(p){var r=(s.results&&s.results[p.id])||0;var note=s.sessionNotes&&s.sessionNotes[p.id];return p.name+': '+(s.buyins&&s.buyins[p.id]||0)+' buyins, P&L='+rs(r)+(note?' | '+note:'');});
  var handSummary='';
  if(sHands&&sHands.length){
    var stats={};A.players.forEach(function(p){stats[p.id]={r:0,f:0,c:0,w:0,t:0};});
    sHands.forEach(function(h){[h.pre||{},h.flop||{},h.turn||{},h.river||{}].forEach(function(st){Object.keys(st).forEach(function(pid){if(!stats[pid])stats[pid]={r:0,f:0,c:0,w:0,t:0};var a=(st[pid].action||'').toLowerCase();stats[pid].t++;if(a==='raise'||a==='all-in')stats[pid].r++;else if(a==='fold')stats[pid].f++;else if(a==='call')stats[pid].c++;});});if(h.winner&&stats[h.winner])stats[h.winner].w++;});
    handSummary='HAND DATA ('+sHands.length+' hands):\n';
    A.players.forEach(function(p){var st=stats[p.id];if(!st||!st.t)return;handSummary+=p.name+': '+st.t+' actions, '+st.r+' raises, '+st.f+' folds, '+st.w+' pots won\n';});
  }
  var hist=A.sessions.filter(function(x){return x.status!=='active'&&x.id!==s.id;}).slice(0,4).map(function(h){var pl2=h.players||A.players;return(h.date||'')+': '+pl2.map(function(p){return p.name+'='+rs((h.results&&h.results[p.id])||0);}).join(', ');}).join('\n');
  var profStr=A.players.map(function(p){return A.aiProfiles[p.id]?p.name+': '+A.aiProfiles[p.id]:'';}).filter(Boolean).join('\n');
  return'You are an elite poker coach.\n\nDATE: '+s.date+'\nBUYIN: Rs.'+(s.buyinAmt||500)+'\n\nRESULTS:\n'+lines.join('\n')+'\n\n'+handSummary+(s.notes?'NOTES: '+s.notes+'\n\n':'')+(hist?'HISTORY:\n'+hist+'\n\n':'')+(profStr?'PROFILES:\n'+profStr+'\n\n':'')+'Provide:\n1. KUNAL COACHING (4-5 lines): patterns from hand data and P&L. One concrete adjustment.\n2. PLAYER UPDATES (one line each "Name: note"): tendencies revealed today.\n3. TABLE READS (3-4 lines): exact exploits for next session.\nBe specific and reference actual numbers.';
}

function profilePrompt(pid){
  var player=A.players.find(function(p){return p.id===pid;});if(!player)return null;
  var sess=A.sessions.filter(function(s){return s.status!=='active'&&s.results&&s.results[pid]!==undefined;});if(!sess.length)return null;
  var hs={r:0,f:0,c:0,w:0,t:0};
  A.hands.forEach(function(h){[h.pre||{},h.flop||{},h.turn||{},h.river||{}].forEach(function(st){if(st[pid]){var a=(st[pid].action||'').toLowerCase();hs.t++;if(a==='raise'||a==='all-in')hs.r++;else if(a==='fold')hs.f++;else if(a==='call')hs.c++;}});if(h.winner===pid)hs.w++;});
  return'You are an elite poker coach. PLAYER: '+player.name+'\nNOTES: '+(A.notes[pid]||'None')+'\nSTATS: '+hs.t+' actions, '+hs.r+' raises ('+(hs.t?Math.round(hs.r/hs.t*100):0)+'%), '+hs.f+' folds, '+hs.c+' calls, '+hs.w+' pots won\n\nSESSIONS:\n'+sess.map(function(s){return(s.date||'')+': '+(s.buyins&&s.buyins[pid]||0)+'x, P&L='+rs((s.results&&s.results[pid])||0);}).join('\n')+'\n\nWrite a 5-6 line STAR profile: showdown tendencies, raise frequency meaning, fold patterns, key exploit, warning. Under 120 words. Very specific and actionable.';
}

function extractUpdates(text,players){
  var lines=text.split('\n');var inSec=false;
  lines.forEach(function(line){
    if(/PLAYER UPDATES/i.test(line)){inSec=true;return;}
    if(/TABLE READS|KUNAL COACHING/i.test(line)&&inSec){inSec=false;return;}
    if(!inSec||!line.trim())return;
    players.forEach(function(p){
      var re=new RegExp('^-?\\s*'+p.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*[:\\-]\\s*','i');
      if(re.test(line)){var note=line.replace(re,'').trim();var date=new Date().toLocaleDateString('en-IN');if(note){A.aiProfiles[p.id]=(A.aiProfiles[p.id]?A.aiProfiles[p.id]+'\n':'')+'['+date+'] '+note;saveMeta('aiProfile_'+p.id,A.aiProfiles[p.id]);}}
    });
  });
}

// ── Firestore ─────────────────────────────────────────────────
async function saveSess(data){
  sync('saving');
  try{
    if(data.id){var id=data.id;var d={};Object.keys(data).forEach(function(k){if(k!=='id')d[k]=data[k];});await setDoc(doc(A.db,'sessions',id),d);}
    else{data.createdAt=serverTimestamp();var ref=await addDoc(collection(A.db,'sessions'),data);data.id=ref.id;}
    sync('ok');return data;
  }catch(e){sync('err');throw e;}
}
async function delSess(id){sync('saving');try{await deleteDoc(doc(A.db,'sessions',id));sync('ok');}catch(e){sync('err');}}
async function saveHand(data){
  try{
    if(data.id){var id=data.id;var d={};Object.keys(data).forEach(function(k){if(k!=='id')d[k]=data[k];});await setDoc(doc(A.db,'hands',id),d);return data;}
    var ref=await addDoc(collection(A.db,'hands'),data);data.id=ref.id;return data;
  }catch(e){console.error('saveHand',e);}
}
async function savePlayer(p){try{await setDoc(doc(A.db,'players',p.id),p);}catch(e){console.error(e);}}
async function saveMeta(key,val){try{await setDoc(doc(A.db,'meta',key),{value:val,updatedAt:serverTimestamp()});}catch(e){console.error(e);}}
async function savePlayerNote(pid,note){A.notes[pid]=note;await saveMeta('note_'+pid,note);}

function startListeners(){
  onSnapshot(query(collection(A.db,'sessions'),orderBy('createdAt','desc')),function(snap){
    A.sessions=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});
    var active=A.sessions.find(function(s){return s.status==='active';});
    if(active){
      if(A.activeSessId!==active.id){
        A.activeSessId=active.id;
        A.liveBuyins=JSON.parse(JSON.stringify(active.buyins||{}));
      }
    } else {
      A.activeSessId=null;
    }
    render();sync('ok');
  },function(){sync('err');});
  onSnapshot(query(collection(A.db,'hands'),orderBy('createdAt','desc')),function(snap){A.hands=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});render();});
  onSnapshot(collection(A.db,'players'),function(snap){if(!snap.empty){A.players=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;}).sort(function(a,b){return(a.order||0)-(b.order||0);});}render();});
  onSnapshot(collection(A.db,'meta'),function(snap){snap.docs.forEach(function(d){var key=d.id,val=d.data().value;if(key.startsWith('note_'))A.notes[key.slice(5)]=val;else if(key.startsWith('aiProfile_'))A.aiProfiles[key.slice(10)]=val;});render();});
}

async function seedPlayers(){
  var snap=await getDocs(collection(A.db,'players'));
  if(!snap.empty){A.players=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;}).sort(function(a,b){return(a.order||0)-(b.order||0);});return;}
  var defs=[{id:'p1',name:'Kunal',order:0},{id:'p2',name:'Nit Guy',order:1},{id:'p3',name:'Aggro Guy',order:2},{id:'p4',name:'Girl 1',order:3},{id:'p5',name:'Girl 2',order:4}];
  var defN={p1:'Hero. Improving every session.',p2:'Only plays strong hands. Folds to small raises. When he calls believe him.',p3:'Bets frequently. Moderate bluffer. Let him bluff into you.',p4:'Calls everything. Shows sets, straights. NEVER bluff her.',p5:'Calls only with a pair. Bluff on high boards she missed.'};
  for(var i=0;i<defs.length;i++){await savePlayer(defs[i]);await savePlayerNote(defs[i].id,defN[defs[i].id]);}
  A.players=defs;Object.keys(defN).forEach(function(k){A.notes[k]=defN[k];});
}

// ── Dashboard ─────────────────────────────────────────────────
function pgDash(){
  var myP=A.players.find(function(p){return p.name==='Kunal';})||A.players[0];
  var mid=myP?myP.id:'';
  var done=A.sessions.filter(function(s){return s.status!=='active';});
  var total=0,wins=0,n=done.length,best=0,worst=0;
  done.forEach(function(s){var r=(s.results&&s.results[mid])||0;total+=r;if(r>0)wins++;if(r>best)best=r;if(r<worst)worst=r;});
  var cd=[],run=0;[].concat(done).reverse().slice(-12).forEach(function(s){run+=(s.results&&s.results[mid])||0;cd.push({date:s.date,r:run});});
  var maxV=1;cd.forEach(function(d){if(Math.abs(d.r)>maxV)maxV=Math.abs(d.r);});
  var chartH='';
  if(cd.length>1){
    var col=total>=0?'#4a9e5c':'#c94a4a';
    var pts=cd.map(function(d,i){return i+','+(50-(d.r/maxV)*44);}).join(' ');
    var dots=cd.map(function(d,i){return'<circle cx="'+i+'" cy="'+(50-(d.r/maxV)*44)+'" r="2.5" fill="'+(d.r>=0?'#4a9e5c':'#c94a4a')+'"/>';}).join('');
    chartH='<div class="card" style="margin-bottom:12px"><div class="ct">Running P&amp;L</div><div class="ch-wrap"><div class="ch-zero"></div><svg width="100%" height="100%" viewBox="0 0 '+(cd.length-1)+' 100" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="0.6" vector-effect="non-scaling-stroke"/>'+dots+'</svg></div><div class="ch-lbls">'+cd.map(function(d){return'<span style="font-size:9px;color:var(--t4)">'+(d.date||'').slice(5)+'</span>';}).join('')+'</div></div>';
  }
  var lastR=n?(done[0].results&&done[0].results[mid]||0):0;
  var heroH='<div class="hero"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'+(myP?avH(myP,'av-lg'):'')+'<div><div class="hero-lbl">'+(n?n+' Sessions':'No sessions yet')+'</div><div style="font-size:22px;font-weight:900;color:var(--cream)">'+(myP?esc(myP.name):'')+'</div></div></div><div class="hero-lbl">Lifetime P&amp;L</div><div class="hero-amt '+(total>=0?'grn':'rrd')+'">'+(total>=0?'+':'')+'Rs.'+Math.abs(Math.round(total)).toLocaleString('en-IN')+'</div>'+(lastR&&n?'<div class="hchg '+(lastR>=0?'pos':'neg')+'">'+(lastR>=0?'+':'')+rs(lastR)+' last session</div>':'')+'</div>';
  var statsH='<div class="pills"><div class="pill"><div class="pill-l">Win Rate</div><div class="pill-v gld">'+(n?Math.round(wins/n*100)+'%':'—')+'</div></div><div class="pill"><div class="pill-l">Best</div><div class="pill-v grn">'+(n?rs(best):'—')+'</div></div><div class="pill"><div class="pill-l">Worst</div><div class="pill-v rrd">'+(n?rs(worst):'—')+'</div></div><div class="pill"><div class="pill-l">Avg</div><div class="pill-v" style="color:var(--t2)">'+(n?rs(Math.round(total/n)):'—')+'</div></div><div class="pill"><div class="pill-l">Hands</div><div class="pill-v gld">'+A.hands.length+'</div></div></div>';

  // Active session banner
  var activeSess=A.sessions.find(function(s){return s.status==='active';});
  var activeH=activeSess?'<div class="act-banner"><div><div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px"><span class="live-dot"></span>Game In Progress</div><div style="font-size:14px;font-weight:700;color:var(--cream)">'+(activeSess.date||'')+'</div><div style="font-size:11px;color:var(--t3)">Rs.'+(activeSess.buyinAmt||500)+'/buyin &middot; '+((activeSess.players||[]).length)+' players</div></div><button class="btn bg" id="go-live-dash" style="padding:9px 14px;font-size:12px">Go Live &rarr;</button></div>':'';

  var recH=n?'<div class="card"><div class="ct g">Recent Sessions</div>'+done.slice(0,4).map(function(s){var r=(s.results&&s.results[mid])||0;var hc=A.hands.filter(function(h){return h.sessionId===s.id;}).length;return'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--cbr)"><div><div style="font-size:13px;color:var(--cream);font-weight:700">'+(s.date||'')+'</div><div style="font-size:11px;color:var(--t3);margin-top:1px">Rs.'+(s.buyinAmt||500)+'/buyin'+(hc?' &middot; '+hc+' hands':'')+'</div></div><span class="'+(r>=0?'grn':'rrd')+' fw7" style="font-size:15px">'+rs(r)+'</span></div>';}).join('')+'</div>'
    :'<div class="empty"><div class="empty-ic">&#9824;</div><div>No sessions yet.<br>Tap + Session to start.</div></div>';

  // Tendency summary
  var tendH='';
  if(A.hands.length>4){
    var stats={};A.players.forEach(function(p){stats[p.id]={r:0,f:0,c:0,w:0,t:0};});
    A.hands.forEach(function(h){[h.pre||{},h.flop||{},h.turn||{},h.river||{}].forEach(function(st){Object.keys(st).forEach(function(pid){if(!stats[pid])return;var a=(st[pid].action||'').toLowerCase();stats[pid].t++;if(a==='raise'||a==='all-in')stats[pid].r++;else if(a==='fold')stats[pid].f++;else if(a==='call')stats[pid].c++;});});if(h.winner&&stats[h.winner])stats[h.winner].w++;});
    tendH='<div class="card"><div class="ct g">&#128200; Tendency Summary</div>';
    A.players.forEach(function(p){var st=stats[p.id];if(!st||st.t<3)return;var rp=Math.round(st.r/st.t*100);var fp=Math.round(st.f/st.t*100);tendH+='<div class="tend-card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'+avH(p,'av-sm')+'<span style="font-size:13px;font-weight:700;color:var(--cream)">'+esc(p.name)+'</span></div><div class="tend-stat"><span class="tl">Raise frequency</span><span class="tv '+(rp>40?'gld':'')+'">+'+(rp>40?'&#128308; High':'&#128993; '+(rp>15?'Medium':'Low'))+' ('+rp+'%)</span></div><div class="tend-stat"><span class="tl">Fold frequency</span><span class="tv">'+(fp>50?'&#128994; Folds often':'&#128308; Rarely folds')+' ('+fp+'%)</span></div><div class="tend-stat"><span class="tl">Pots won</span><span class="tv gld">'+st.w+' of '+A.hands.length+'</span></div></div>';});
    tendH+='</div>';
  }
  return heroH+statsH+activeH+chartH+recH+tendH;
}

// ── START SESSION MODAL ───────────────────────────────────────
function openStartModal(){
  // Check if there is already an active session
  var existing=A.sessions.find(function(s){return s.status==='active';});
  if(existing){
    if(confirm('There is already an active session on '+existing.date+'. End it first or continue it?\n\nOK = Continue active session\nCancel = Do nothing')){
      A.tab='live';buildNav();render();
    }
    return;
  }
  A.sf={
    playerIds:A.players.map(function(p){return p.id;}), // all on by default
    guests:[],
    buyinAmt:500,
    date:new Date().toISOString().split('T')[0]
  };
  drawStartModal();
}

function drawStartModal(){
  var sf=A.sf;
  var playerRows=A.players.map(function(p){
    var on=sf.playerIds.indexOf(p.id)>-1;
    return'<div class="pl-tgl'+(on?' on':' off')+'" data-ptgl="'+p.id+'"><div style="display:flex;align-items:center;gap:10px">'+avH(p,'av-sm')+'<span style="font-size:13px;font-weight:700;color:var(--cream)">'+esc(p.name)+'</span></div><div class="tgl'+(on?' on':'')+'" id="tgl-'+p.id+'"></div></div>';
  }).join('');

  var guestRows=sf.guests.map(function(g,i){
    return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:8px 12px"><span style="font-size:13px;color:var(--cream);flex:1">'+esc(g)+'</span><button class="rmg" data-rmguest="'+i+'">&#10005;</button></div>';
  }).join('');

  el('mbox').innerHTML='<div class="mt">&#9824; Start Session</div>'
    +'<div class="fg2"><div><label class="fl">Date</label><input type="date" id="sf-date" value="'+sf.date+'"></div><div><label class="fl">Buyin Rs.</label><input type="number" id="sf-amt" value="'+sf.buyinAmt+'"></div></div>'
    +'<div class="ct g" style="margin-bottom:10px">Who is playing today?</div>'
    +playerRows
    +(guestRows?'<div style="margin-top:8px">'+guestRows+'</div>':'')
    +'<div id="guest-zone" style="margin-top:8px;margin-bottom:16px"></div>'
    +'<div style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--t2);line-height:1.6">'
    +'&#9432; After starting, go to the <strong style="color:var(--gold)">Live tab</strong> to log hands and track rebuys. When the game ends, tap <strong style="color:var(--gold)">End Session</strong> there to enter cashouts.'
    +'</div>'
    +'<div class="row2"><button class="btn bd" id="sf-cancel">Cancel</button><button class="btn bg" id="sf-start" style="flex:2">&#127183; Start Session</button></div>';

  el('mover').classList.add('show');
  showGuestZone();
  bindStartModal();
}

function bindStartModal(){
  var sf=A.sf;
  el('sf-date').addEventListener('change',function(){sf.date=this.value;});
  el('sf-amt').addEventListener('change',function(){sf.buyinAmt=Number(this.value)||500;});
  document.querySelectorAll('[data-ptgl]').forEach(function(row){
    row.addEventListener('click',function(){
      var pid=row.dataset.ptgl;
      var idx=sf.playerIds.indexOf(pid);
      if(idx>-1)sf.playerIds.splice(idx,1);
      else sf.playerIds.push(pid);
      drawStartModal();
    });
  });
  document.querySelectorAll('[data-rmguest]').forEach(function(btn){
    btn.addEventListener('click',function(){sf.guests.splice(parseInt(btn.dataset.rmguest),1);drawStartModal();});
  });
  el('sf-cancel').addEventListener('click',closeModal);
  el('sf-start').addEventListener('click',doStartSession);
}

function showGuestZone(){
  var gz=el('guest-zone');if(!gz)return;
  gz.innerHTML='<button class="dsh" id="add-g-btn">+ Add Guest Player</button>';
  el('add-g-btn').addEventListener('click',function(){
    gz.innerHTML='<div class="ginput"><input type="text" id="g-in" placeholder="Guest name..."><button class="btn bg" id="g-ok" style="padding:10px 14px;white-space:nowrap">Add</button><button class="btn bd" id="g-x" style="padding:10px 12px">&#10005;</button></div>';
    el('g-in').focus();
    el('g-ok').addEventListener('click',doAddGuest);
    el('g-in').addEventListener('keydown',function(e){if(e.key==='Enter')doAddGuest();});
    el('g-x').addEventListener('click',function(){showGuestZone();});
  });
}

function doAddGuest(){
  var inp=el('g-in');var name=inp?inp.value.trim():'';if(!name)return;
  A.sf.guests.push(name);drawStartModal();
}

async function doStartSession(){
  var sf=A.sf;
  var fd=el('sf-date');if(fd)sf.date=fd.value;
  var fa=el('sf-amt');if(fa)sf.buyinAmt=Number(fa.value)||500;
  if(!sf.playerIds.length&&!sf.guests.length){alert('Select at least one player.');return;}

  // Build player list for this session
  var sessionPlayers=[];
  sf.playerIds.forEach(function(pid){var p=A.players.find(function(x){return x.id===pid;});if(p)sessionPlayers.push({id:p.id,name:p.name});});
  sf.guests.forEach(function(name){sessionPlayers.push({id:uid(),name:name,isGuest:true});});

  // Initial buyins = 1 each
  var buyins={};sessionPlayers.forEach(function(p){buyins[p.id]=1;});

  var sessData={
    date:sf.date,
    buyinAmt:sf.buyinAmt,
    players:sessionPlayers,
    buyins:buyins,
    sessionNotes:{},
    notes:'',
    results:{},
    status:'active',
    createdAt:serverTimestamp()
  };

  closeModal();
  var saved=await saveSess(sessData);
  if(saved&&saved.id){
    A.activeSessId=saved.id;
    A.liveBuyins=JSON.parse(JSON.stringify(buyins));
    A.lh={step:'dealer',dealer:null,pre:{},flop:{},turn:{},river:{},fc:[null,null,null],tc:null,rc:null,winner:null,hcards:{},count:0};
    A.tab='live';buildNav();render();
  }
}

// ── LIVE TAB ──────────────────────────────────────────────────
function getActiveSess(){return A.sessions.find(function(s){return s.id===A.activeSessId;});}
function getLivePlayers(){var s=getActiveSess();return s?s.players:[];}

function pgLive(){
  var lh=A.lh;
  var sess=getActiveSess();
  var sessHands=A.activeSessId?A.hands.filter(function(h){return h.sessionId===A.activeSessId;}):[];

  if(!A.activeSessId||!sess){
    return'<div class="empty"><div class="empty-ic">&#127183;</div><div>No active session.<br>Tap + Session to start a new game.</div></div>';
  }

  var pl=getLivePlayers();
  var h='';

  // Live header
  h+='<div class="live-hdr"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:11px;color:var(--t3);margin-bottom:2px"><span class="live-dot"></span>LIVE &middot; '+esc(sess.date)+'</div><div style="font-size:13px;color:var(--t2)">Rs.'+(sess.buyinAmt||500)+'/buyin &middot; '+pl.length+' players</div></div><div style="text-align:right"><div class="hand-num">'+(lh.count+1)+'</div><div class="hand-sub">Hand #</div></div></div></div>';

  // ── REBUY SECTION (always visible) ──
  h+='<div class="card"><div class="ct g">&#128260; Rebuy Tracker</div>';
  pl.forEach(function(p){
    var cnt=A.liveBuyins[p.id]||1;
    var invested=cnt*(sess.buyinAmt||500);
    h+='<div class="rebuy-row"><div class="rebuy-left">'+avH(p,'av-sm')+'<div><div class="rebuy-name">'+esc(p.name)+'</div><div class="rebuy-invested">'+cnt+'&times; buyin &middot; Rs.'+invested.toLocaleString('en-IN')+' invested</div></div></div><div class="stp"><button class="sb" data-dec="'+p.id+'">&#8722;</button><span class="sv" id="lsv-'+p.id+'">'+cnt+'</span><button class="sb" data-inc="'+p.id+'">+</button></div></div>';
  });
  h+='</div>';

  // ── HAND LOGGER ──
  h+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div class="ct g" style="margin-bottom:0">Hand Logger</div><button class="btn bd" style="padding:6px 10px;font-size:11px" id="skip-hand-btn">Skip Hand</button></div>';

  // Street progress
  var stepIdx=['dealer','preflop','flop','turn','river','showdown'].indexOf(lh.step);
  h+='<div class="street-bar">';
  ['Dealer','Pre','Flop','Turn','River','Show'].forEach(function(s,i){h+='<div class="ss'+(i<stepIdx?' done':i===stepIdx?' active':'')+'" title="'+s+'"></div>';});
  h+='</div>';

  if(lh.step==='dealer')h+=stepDealer(pl);
  else if(lh.step==='preflop')h+=stepActions('preflop','Preflop',ACTS_PRE,true,pl);
  else if(lh.step==='flop')h+=stepFlop(pl);
  else if(lh.step==='turn')h+=stepStreet('turn','Turn',lh.tc,pl);
  else if(lh.step==='river')h+=stepStreet('river','River',lh.rc,pl);
  else if(lh.step==='showdown')h+=stepShowdown(pl);

  h+='</div>';

  // ── END SESSION BUTTON ──
  h+='<button class="btn br fw" id="end-sess-btn" style="margin-bottom:12px">&#9635; End Session &amp; Enter Cashouts</button>';

  // ── LOGGED HANDS ──
  if(sessHands.length){
    h+='<div class="card"><div class="ct g">&#128221; Logged Hands ('+sessHands.length+')</div>';
    sessHands.slice(0,8).forEach(function(hand,idx){h+=handLogHTML(hand,idx,pl);});
    if(sessHands.length>8)h+='<div style="font-size:11px;color:var(--t3);text-align:center;padding:6px">...and '+(sessHands.length-8)+' more</div>';
    h+='</div>';
  }
  return h;
}

function stepDealer(pl){
  var lh=A.lh;
  var h='<div class="slbl">&#9824; Who is dealing?</div><div class="dealer-grid">';
  pl.forEach(function(p){
    var sel=lh.dealer===p.id;
    h+='<button class="dealer-btn" data-seldealer="'+p.id+'">'+avH(p,'av-md '+(sel?'av-sel':''))+'<span class="dealer-name">'+esc(p.name.split(' ')[0])+'</span>'+(sel?'<span style="font-size:9px;color:var(--gold)">&#9679;</span>':'')+'</button>';
  });
  h+='</div><button class="btn bg fw" id="step-dealer-next">Preflop &rarr;</button>';
  return h;
}

function stepActions(street,label,actions,isPre,pl){
  var lh=A.lh;
  var streetData=lh[street==='preflop'?'pre':street]||{};
  var activePl=isPre?pl:pl.filter(function(p){return!lh.pre[p.id]||lh.pre[p.id].action!=='Fold';});
  var h='<div class="slbl">'+label+'</div><div class="act-rows">';
  activePl.forEach(function(p){
    var cur=streetData[p.id]||{action:isPre?'Call':'Check'};
    var showAmt=cur.action==='Raise'||cur.action==='Bet'||cur.action==='All-In';
    h+='<div class="act-row" id="arow-'+street+'-'+p.id+'">'+avH(p,'av-sm')+'<span class="act-row-name">'+esc(p.name.split(' ')[0])+'</span>';
    h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px"><div class="act-btns">';
    actions.forEach(function(a){var cls=cur.action===a?(' s'+a.toLowerCase().replace(/[^a-z]/g,'').slice(0,2)):'';h+='<button class="abt2'+cls+'" data-ab="'+p.id+'" data-act="'+a+'" data-street="'+street+'">'+a+'</button>';});
    h+='</div><input class="amt-inp'+(showAmt?' show':'')+'" id="amt-'+street+'-'+p.id+'" type="number" placeholder="Rs.amt" value="'+(cur.amount||'')+'" data-amtf="'+p.id+'" data-street="'+street+'"></div></div>';
  });
  h+='</div>';
  var prev={preflop:'dealer',flop:'preflop',turn:'flop',river:'turn',showdown:'river'}[street]||'dealer';
  var next={preflop:'flop',flop:'turn',turn:'river',river:'showdown'}[street]||'showdown';
  h+='<div style="display:flex;gap:8px"><button class="btn bd" style="flex:1;padding:12px" data-stepgo="'+prev+'">&larr; Back</button><button class="btn bg" style="flex:2;padding:12px" data-stepgo="'+next+'">'+(street==='river'?'Showdown':'Next')+' &rarr;</button></div>';
  return h;
}

function stepFlop(pl){
  var lh=A.lh;
  var h='<div class="slbl">Flop Cards</div><div class="brd-cards">';
  for(var i=0;i<3;i++){var c=lh.fc[i];h+=c?'<div class="pcard '+(c.r?'red':'blk')+'" data-pc="flop-'+i+'"><div class="cv">'+c.v+'</div><div class="cs">'+c.s+'</div></div>':'<div class="pcard empty" data-pc="flop-'+i+'">+</div>';}
  h+='</div>';
  h+=stepActions('flop','Flop Actions',ACTS_POST,false,pl);
  return h;
}

function stepStreet(street,label,card,pl){
  var h='<div class="slbl">'+label+' Card</div><div class="brd-cards">';
  h+=card?'<div class="pcard '+(card.r?'red':'blk')+'" data-pc="'+street+'"><div class="cv">'+card.v+'</div><div class="cs">'+card.s+'</div></div>':'<div class="pcard empty" data-pc="'+street+'">+</div>';
  h+='</div>';
  h+=stepActions(street,label+' Actions',ACTS_POST,false,pl);
  return h;
}

function stepShowdown(pl){
  var lh=A.lh;
  var activePl=pl.filter(function(p){return!lh.pre[p.id]||lh.pre[p.id].action!=='Fold';});
  var h='<div class="slbl">&#127942; Showdown — Who won?</div><div class="winner-grid">';
  activePl.forEach(function(p){h+='<button class="wbtn'+(lh.winner===p.id?' sel':'')+'" data-setwinner="'+p.id+'">'+avH(p,'av-sm')+'<span class="winner-name">'+esc(p.name.split(' ')[0])+'</span>'+(lh.winner===p.id?'<span style="font-size:9px;color:var(--gold)">&#127942;</span>':'')+'</button>';});
  h+='</div><div class="ct g" style="margin-top:8px">Hole cards (optional)</div>';
  pl.forEach(function(p){h+='<div class="hcard-row">'+avH(p,'av-sm')+'<span class="hcard-name">'+esc(p.name.split(' ')[0])+'</span><input class="hcard-inp" id="hc-'+p.id+'" placeholder="A&#9824; K&#9829;" value="'+(lh.hcards&&lh.hcards[p.id]||'')+'"></div>';});
  h+='<div style="display:flex;gap:8px;margin-top:14px"><button class="btn bd" style="flex:1;padding:12px" data-stepgo="river">&larr; Back</button><button class="btn bg" style="flex:2;padding:12px" id="log-hand-btn">&#10003; Log Hand</button></div>';
  return h;
}

function handLogHTML(hand,idx,pl){
  pl=pl||getLivePlayers();
  var nameOf=function(id){return((pl.find(function(p){return p.id===id;})||{}).name)||id;};
  var h='<div class="hlog"><div class="hlog-hdr"><span>Hand #'+(hand.handNumber||idx+1)+'</span>'+(hand.dealer?'<span>'+esc(nameOf(hand.dealer))+' deals</span>':'')+'</div>';
  var allCards=[];
  if(hand.fc)hand.fc.forEach(function(c){if(c)allCards.push(c);});
  if(hand.tc)allCards.push(hand.tc);if(hand.rc)allCards.push(hand.rc);
  if(allCards.length){h+='<div class="brd-mini">';allCards.forEach(function(c){h+='<span class="mc '+(c.r?'red':'blk')+'">'+c.v+c.s+'</span>';});h+='</div>';}
  ['pre','flop','turn','river'].forEach(function(street){
    var sd=hand[street];if(!sd||!Object.keys(sd).length)return;
    h+='<div class="sname">'+{pre:'PREFLOP',flop:'FLOP',turn:'TURN',river:'RIVER'}[street]+'</div>';
    Object.keys(sd).forEach(function(pid){
      var act=sd[pid];if(!act||!act.action)return;
      var a=act.action.toLowerCase().replace(/-/g,'');
      var cls={fold:'fld',call:'cll',check:'chk',raise:'rse',bet:'bet',allin:'ali'}[a]||'chk';
      h+='<span class="chip '+cls+'">'+esc(nameOf(pid).split(' ')[0])+' '+act.action+(act.amount?' Rs.'+act.amount:'')+'</span>';
    });
  });
  if(hand.winner){var wcard=(hand.hcards&&hand.hcards[hand.winner])?' ('+esc(hand.hcards[hand.winner])+')':'';h+='<div class="win-chip">&#127942; '+esc(nameOf(hand.winner))+' won'+wcard+'</div>';}

  // show other revealed hands
  if(hand.hcards)Object.keys(hand.hcards).forEach(function(pid){if(pid!==hand.winner&&hand.hcards[pid])h+='<span style="font-size:10px;color:var(--t3);margin-left:6px">'+esc(nameOf(pid).split(' ')[0])+': '+esc(hand.hcards[pid])+'</span>';});
  h+='</div>';
  return h;
}

function bindLive(){
  var lh=A.lh;
  var pl=getLivePlayers();
  var sess=getActiveSess();
  if(!sess)return;

  // Go live button from dashboard
  var goLiveBtn=el('go-live-dash');
  if(goLiveBtn)goLiveBtn.addEventListener('click',function(){A.tab='live';buildNav();render();});

  // Rebuy steppers
  document.querySelectorAll('[data-inc]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=btn.dataset.inc;
      A.liveBuyins[id]=(A.liveBuyins[id]||1)+1;
      var sv=el('lsv-'+id);if(sv)sv.textContent=A.liveBuyins[id];
      updateLiveBuyins(sess);
    });
  });
  document.querySelectorAll('[data-dec]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=btn.dataset.dec;
      A.liveBuyins[id]=Math.max(1,(A.liveBuyins[id]||1)-1);
      var sv=el('lsv-'+id);if(sv)sv.textContent=A.liveBuyins[id];
      updateLiveBuyins(sess);
    });
  });

  // Skip hand
  var skipBtn=el('skip-hand-btn');
  if(skipBtn)skipBtn.addEventListener('click',function(){
    lh.step='dealer';lh.dealer=null;lh.pre={};lh.flop={};lh.turn={};lh.river={};
    lh.fc=[null,null,null];lh.tc=null;lh.rc=null;lh.winner=null;lh.hcards={};
    lh.count++;render();
  });

  // Dealer selection
  document.querySelectorAll('[data-seldealer]').forEach(function(btn){
    btn.addEventListener('click',function(){lh.dealer=btn.dataset.seldealer;render();});
  });
  var dealerNext=el('step-dealer-next');
  if(dealerNext)dealerNext.addEventListener('click',function(){lh.step='preflop';render();});

  // Step navigation
  document.querySelectorAll('[data-stepgo]').forEach(function(btn){
    btn.addEventListener('click',function(){lh.step=btn.dataset.stepgo;render();});
  });

  // Action buttons
  document.querySelectorAll('[data-ab]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var pid=btn.dataset.ab,act=btn.dataset.act,street=btn.dataset.street;
      var key=street==='preflop'?'pre':street;
      if(!lh[key])lh[key]={};
      lh[key][pid]=lh[key][pid]||{};
      lh[key][pid].action=act;
      var amtInp=el('amt-'+street+'-'+pid);
      if(amtInp){if(act==='Raise'||act==='Bet'||act==='All-In')amtInp.classList.add('show');else amtInp.classList.remove('show');}
      var row=el('arow-'+street+'-'+pid);
      if(row){row.querySelectorAll('[data-ab="'+pid+'"]').forEach(function(b){var cls=b.dataset.act===act?(' s'+act.toLowerCase().replace(/[^a-z]/g,'').slice(0,2)):'';b.className='abt2'+cls;});}
    });
  });

  // Amount inputs
  document.querySelectorAll('[data-amtf]').forEach(function(inp){
    inp.addEventListener('input',function(){
      var pid=inp.dataset.amtf,street=inp.dataset.street;
      var key=street==='preflop'?'pre':street;
      if(!lh[key])lh[key]={};if(!lh[key][pid])lh[key][pid]={};
      lh[key][pid].amount=inp.value;
    });
  });

  // Card picker
  document.querySelectorAll('[data-pc]').forEach(function(btn){
    btn.addEventListener('click',function(){openCardPicker(btn.dataset.pc);});
  });

  // Winner
  document.querySelectorAll('[data-setwinner]').forEach(function(btn){
    btn.addEventListener('click',function(){lh.winner=btn.dataset.setwinner;render();});
  });

  // Hole cards
  pl.forEach(function(p){var inp=el('hc-'+p.id);if(inp)inp.addEventListener('input',function(){if(!lh.hcards)lh.hcards={};lh.hcards[p.id]=inp.value;});});

  // Log hand
  var logBtn=el('log-hand-btn');
  if(logBtn)logBtn.addEventListener('click',doLogHand);

  // End session
  var endBtn=el('end-sess-btn');
  if(endBtn)endBtn.addEventListener('click',openCashoutModal);
}

async function doLogHand(){

function applyCard(target,card){
  var lh=A.lh;
  if(target.startsWith('flop-')){lh.fc[parseInt(target.split('-')[1])]=card;}
  else if(target==='turn')lh.tc=card;
  else if(target==='river')lh.rc=card;
  render();
}

// ── CASHOUT MODAL (End Session) ───────────────────────────────
function openCashoutModal(){
  var sess=getActiveSess();if(!sess)return;
  var pl=sess.players||A.players;
  var buyins=A.liveBuyins;
  var cashouts={};pl.forEach(function(p){cashouts[p.id]='';});
  var sessionNotes={};pl.forEach(function(p){sessionNotes[p.id]='';});

  drawCashoutModal(sess,pl,buyins,cashouts,sessionNotes,'');
}

function drawCashoutModal(sess,pl,buyins,cashouts,sessionNotes,globalNote){
  var buyinAmt=sess.buyinAmt||500;
  var results={};
  pl.forEach(function(p){results[p.id]=(Number(cashouts[p.id])||0)-(buyins[p.id]||1)*buyinAmt;});
  var totalIn=pl.reduce(function(s,p){return s+(buyins[p.id]||1)*buyinAmt;},0);
  var totalOut=pl.reduce(function(s,p){return s+(Number(cashouts[p.id])||0);},0);
  var diff=Math.abs(totalOut-totalIn);var balanced=diff<1;

  var rows=pl.map(function(p){
    var cnt=buyins[p.id]||1;
    var invested=cnt*buyinAmt;
    var co=cashouts[p.id];
    var pnl=co!==''?(Number(co)||0)-invested:null;
    return'<div class="co-row">'+avH(p,'av-sm')+'<div class="co-info"><div class="co-name">'+esc(p.name)+'</div><div class="co-inv">'+cnt+'&times; buyin &middot; Rs.'+invested.toLocaleString('en-IN')+' invested</div></div><input class="co-inp" type="number" min="0" placeholder="0" id="co-'+p.id+'" value="'+esc(co||'')+'" style="width:90px;text-align:center"><div class="co-pnl '+(pnl!==null?(pnl>=0?'grn':'rrd'):'')+'">'+(pnl!==null?rs(pnl):'')+'</div></div>';
  }).join('');

  el('mbox').innerHTML='<div class="mt">&#9635; End Session</div>'
    +'<div style="font-size:12px;color:var(--t3);margin-bottom:14px">'+esc(sess.date)+' &middot; Rs.'+buyinAmt+'/buyin</div>'
    +'<div class="ct g">Enter Cashout Amounts</div>'
    +rows
    +'<div class="bal '+(balanced?'bok':'berr')+'" style="margin-top:10px"><span style="color:var(--t2)">Balance Check</span><span class="'+(balanced?'grn':'rrd')+'">'+(balanced?'&#10003; Balanced':'Off by Rs.'+diff.toFixed(0))+'</span></div>'
    +settlH(results,pl)
    +'<div style="margin-top:14px"><label class="fl">Session Notes</label><textarea id="end-notes" style="height:52px" placeholder="Key observations...">'+esc(globalNote)+'</textarea></div>'
    +'<div class="row2"><button class="btn bd" id="end-cancel">Cancel</button><button class="btn bg" style="flex:2" id="end-save">Save &amp; End Session</button></div>';

  el('mover').classList.add('show');

  // Live P&L update on input
  pl.forEach(function(p){
    var inp=el('co-'+p.id);
    if(inp)inp.addEventListener('input',function(){
      cashouts[p.id]=inp.value;
      drawCashoutModal(sess,pl,buyins,cashouts,sessionNotes,(el('end-notes')||{}).value||'');
    });
  });

  el('end-cancel').addEventListener('click',closeModal);
  el('end-save').addEventListener('click',async function(){
    // Read final values
    pl.forEach(function(p){var inp=el('co-'+p.id);if(inp)cashouts[p.id]=inp.value;});
    var gn=(el('end-notes')||{}).value||'';
    var finalResults={};
    pl.forEach(function(p){finalResults[p.id]=(Number(cashouts[p.id])||0)-(buyins[p.id]||1)*buyinAmt;});
    var sn={};
    // Carry over any existing session notes
    pl.forEach(function(p){sn[p.id]=sess.sessionNotes&&sess.sessionNotes[p.id]||'';});

    await saveSess({
      id:sess.id,
      date:sess.date,buyinAmt:buyinAmt,
      players:pl,buyins:buyins,
      cashouts:cashouts,
      sessionNotes:sn,
      notes:gn,
      results:finalResults,
      status:'done',
      createdAt:sess.createdAt
    });
    A.activeSessId=null;
    closeModal();
    A.tab='sessions';buildNav();render();
  });
}

    var cnt=A.sessions.filter(function(s){return s.status!=='active'&&s.results&&s.results[p.id]!==undefined;}).length;
    h+='<div class="pc"><div class="pc-top">'+avH(p,'av-lg')+'<div class="pc-info"><div id="pnrow-'+p.id+'"><div class="pc-name">'+esc(p.name)+'</div></div>'+(tag?'<div><span class="ptag" style="color:'+tag.c+';border-color:'+tag.c+'">'+tag.l+'</span></div>':'')+(i===0?'<div style="font-size:9px;color:var(--gold);font-weight:700;letter-spacing:.08em;margin-top:3px">YOU</div>':'')+'<div style="font-size:10px;color:var(--t3);margin-top:3px">'+cnt+' sessions</div></div></div>'
      +'<div class="pc-acts"><button class="abt gld" data-en="'+p.id+'">&#9998; Rename</button><button class="abt gld" data-note="'+p.id+'">&#128221; Notes</button>'+(A.apiKey&&cnt>0?'<button class="abt prp" data-aip="'+p.id+'">&#9889; AI Profile</button>':'')+(i>0?'<button class="abt rrd" data-rmp="'+p.id+'">Remove</button>':'')+'</div>'
      +'<div style="margin-top:10px"><div class="pc-bio'+(note?'':' em')+'">'+esc(note||'No notes yet. Tap Notes to add your reads.')+'</div></div>'
      +(aiP?'<div class="ai-prof"><div class="ai-prof-l">&#9889; AI Profile</div><div id="aip-'+p.id+'" class="ai-prof-t">'+esc(aiP)+'</div></div>':'<div id="aip-zone-'+p.id+'"></div>')
      +'</div>';
  });
  h+='<div class="card"><div class="ct g">Add Permanent Player</div><div style="display:flex;gap:8px"><input type="text" id="np-in" placeholder="Player name..."><button class="btn bg" id="np-btn" style="white-space:nowrap;padding:10px 14px">Add</button></div></div>';
  return h;
}

function bindPlayers(){
  document.querySelectorAll('[data-en]').forEach(function(btn){
    btn.addEventListener('click',function(){var id=btn.dataset.en;var p=A.players.find(function(x){return x.id===id;});var row=el('pnrow-'+id);row.innerHTML='<div class="ne-row"><input type="text" id="ne-'+id+'" value="'+esc(p.name)+'"><button class="ns-btn" id="ns-'+id+'">Save</button><button style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:0 4px" id="nc-'+id+'">&#10005;</button></div>';el('ns-'+id).addEventListener('click',function(){var val=(el('ne-'+id)||{}).value;if(!val||!val.trim())return;savePlayer(Object.assign({},p,{name:val.trim()}));render();});el('nc-'+id).addEventListener('click',function(){render();});el('ne-'+id).focus();});
  });
  document.querySelectorAll('[data-note]').forEach(function(btn){btn.addEventListener('click',function(){openNoteModal(btn.dataset.note);});});
  document.querySelectorAll('[data-aip]').forEach(function(btn){btn.addEventListener('click',function(){runPlayerAI(btn.dataset.aip);});});
  document.querySelectorAll('[data-rmp]').forEach(function(btn){btn.addEventListener('click',function(){if(confirm('Remove this player?'))deleteDoc(doc(A.db,'players',btn.dataset.rmp));});});
  var npBtn=el('np-btn'),npIn=el('np-in');
  if(npBtn)npBtn.addEventListener('click',doAddPlayer);
  if(npIn)npIn.addEventListener('keydown',function(e){if(e.key==='Enter')doAddPlayer();});
}

function openNoteModal(id){
  var p=A.players.find(function(x){return x.id===id;});
  el('mbox').innerHTML='<div class="mt">&#128221; Notes</div><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+avH(p||{id:id,name:'?'},'av-md')+'<div><div style="font-size:15px;font-weight:700;color:var(--cream)">'+esc(p?p.name:id)+'</div><div style="font-size:11px;color:var(--t3)">STAR Profile Notes</div></div></div><textarea id="note-ta" style="height:140px;margin-bottom:14px" placeholder="Showdown tendencies, playing style, exploits, tells...">'+esc(A.notes[id]||'')+'</textarea><div class="row2"><button class="btn bd" id="nc">Cancel</button><button class="btn bg" id="nsave">Save Notes</button></div>';
  el('mover').classList.add('show');
  el('nc').addEventListener('click',closeModal);
  el('nsave').addEventListener('click',function(){savePlayerNote(id,(el('note-ta')||{}).value||'');closeModal();render();});
}

async function doAddPlayer(){var inp=el('np-in');var name=inp&&inp.value.trim();if(!name)return;var id=uid();await savePlayer({id:id,name:name,order:A.players.length});await savePlayerNote(id,'');inp.value='';}

function runPlayerAI(id){
  var prompt=profilePrompt(id);if(!prompt){alert('Not enough session data yet.');return;}
  var zone=el('aip-'+id)||el('aip-zone-'+id);if(!zone)return;
  var aiDiv=document.createElement('div');aiDiv.className='ai-prof';
  aiDiv.innerHTML='<div class="ai-prof-l">&#9889; Building...</div><div class="thinking"><div class="dots"><span></span><span></span><span></span></div></div><div id="aip-st-'+id+'"></div>';
  zone.replaceWith(aiDiv);var streamEl=el('aip-st-'+id);var text='';
  callClaude(prompt,function(chunk){text+=chunk;if(streamEl)streamEl.textContent=text;},function(){A.aiProfiles[id]=text;saveMeta('aiProfile_'+id,text);render();},function(err){aiDiv.innerHTML+='<div style="color:var(--red);font-size:12px">Error: '+esc(err)+'</div>';});
}

// ── SETTINGS ──────────────────────────────────────────────────
function pgSettings(){
  return'<div class="card"><div class="ct g">&#9889; Claude AI Key</div><p style="font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:12px">For automatic player profiling and session coaching. Free key at <strong style="color:var(--gold)">console.anthropic.com</strong> → API Keys → Create Key.</p>'+(A.apiKey?'<div style="font-size:12px;color:var(--green);margin-bottom:10px">&#10003; AI connected</div>':'<div style="font-size:12px;color:var(--red);margin-bottom:10px">&#10005; No AI key — add below</div>')+'<div style="display:flex;gap:8px"><input type="password" id="ai-key-in" placeholder="sk-ant-..." value="'+esc(A.apiKey)+'" style="flex:1"><button class="btn bg" id="ai-save" style="white-space:nowrap;padding:10px 14px">Save</button></div><p style="font-size:11px;color:var(--t3);margin-top:8px">Free tier covers hundreds of sessions at your usage level.</p></div>'
    +'<div class="card"><div class="ct g">&#128293; Firebase Project</div><p style="font-size:13px;color:var(--green);margin-bottom:4px">&#10003; mypokertable-5fea4</p><p style="font-size:12px;color:var(--t3)">Hardcoded — no setup needed on any device.</p></div>'
    +'<div class="card"><div class="ct" style="color:var(--red)">Danger Zone</div><p style="font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:12px">Delete all finished sessions. Active session and player profiles are kept.</p><button class="btn br fw" id="clear-all">Clear All Finished Sessions</button></div>';
}
function bindSettings(){
  el('ai-save').addEventListener('click',function(){var val=(el('ai-key-in')||{}).value;if(val&&val.trim().startsWith('sk-ant')){A.apiKey=val.trim();LS('pkl-aikey',A.apiKey);alert('AI key saved! Coaching is now active.');render();}else alert('Key must start with sk-ant-');});
  el('clear-all').addEventListener('click',async function(){if(confirm('Delete all finished sessions? Cannot be undone.')){sync('saving','Deleting...');var snap=await getDocs(collection(A.db,'sessions'));for(var i=0;i<snap.docs.length;i++){var d=snap.docs[i].data();if(d.status!=='active')await deleteDoc(snap.docs[i].ref);}sync('ok');render();}});
}

function closeModal(){el('mover').classList.remove('show');}
</script>
</body>
</html>
